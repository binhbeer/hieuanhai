services:
    app:
        build:
            context: ./.docker-php/8.4
            dockerfile: Dockerfile
            args:
                WWWUSER: "1000"
                WWWGROUP: "1000"
        container_name: chinhanh-app
        image: chinhanh-8.4/app
        extra_hosts:
            - "host.docker.internal:host-gateway"
            - "chinhanh.local:127.0.0.1"
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./app:/var/www/html
            - ./log/nginx:/var/log/nginx
        networks:
            - chinhanh-network
        depends_on:
            mysql:
                condition: service_healthy
            dragonfly:
                condition: service_started
            memcached:
                condition: service_started
            imgproxy:
                condition: service_started
        ulimits:
            nofile:
                soft: 65536
                hard: 65536

    mysql:
        container_name: chinhanh-mysql
        image: mysql:8.0.36
        ports:
            - "33060:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_ROOT_HOST: "%"
            MYSQL_DATABASE: chinhanh
        volumes:
            - ./data/mysql:/var/lib/mysql
            - ./.docker-php/my.cnf:/etc/my.cnf:ro
            - ./log/mysql:/var/log/mysql
        networks:
            - chinhanh-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-proot"]
            retries: 5
            timeout: 5s
        restart: unless-stopped

    dragonfly:
        container_name: chinhanh-dragonfly
        image: docker.dragonflydb.io/dragonflydb/dragonfly
        command:
            - "--maxmemory"
            - "512mb"
            - "--proactor_threads"
            - "1"
            - "--requirepass"
            - "dragonfly@password"
        ports:
            - "6380:6379"
        volumes:
            - ./data/dragonfly:/data
        networks:
            - chinhanh-network
        ulimits:
            memlock: -1
        restart: unless-stopped

    memcached:
        container_name: chinhanh-memcached
        image: memcached:latest
        command: memcached -m 256 -c 1024 -p 11211 -u memcache -l 0.0.0.0
        ports:
            - "11212:11211"
        networks:
            - chinhanh-network
        restart: unless-stopped

    imgproxy:
        container_name: chinhanh-imgproxy
        image: darthsim/imgproxy:latest
        ports:
            - "8083:8080"
        environment:
            IMGPROXY_KEY: ""
            IMGPROXY_SALT: ""
            IMGPROXY_LOCAL_FILESYSTEM_ROOT: /data
            IMGPROXY_WORKERS: 2
            IMGPROXY_MAX_SRC_RESOLUTION: 50
            IMGPROXY_MAX_SRC_FILE_SIZE: 20971520
            IMGPROXY_TTL: 31536000
            IMGPROXY_USE_ETAG: "true"
            IMGPROXY_QUALITY: 85
            IMGPROXY_AUTO_WEBP: "true"
            IMGPROXY_AUTO_AVIF: "true"
            IMGPROXY_JPEG_PROGRESSIVE: "true"
            IMGPROXY_STRIP_METADATA: "true"
            IMGPROXY_ALLOW_LOOPBACK_SOURCE_ADDRESSES: "true"
            IMGPROXY_ALLOW_PRIVATE_SOURCE_ADDRESSES: "true"
            IMGPROXY_TIMEOUT: 30
        volumes:
            - ./app/public/medias:/data/medias:ro
            - ./app/public/media:/data/media:ro
            - ./app/storage/app/public:/data/storage:ro
        networks:
            - chinhanh-network
        restart: unless-stopped

networks:
    chinhanh-network:
        driver: bridge
