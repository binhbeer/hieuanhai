upstream vite_dev {
    server host.docker.internal:5173 max_fails=1 fail_timeout=1s;
    server 127.0.0.1:5173 backup;
}

server {
    listen [::]:80 default_server;
    listen 80 default_server;
    server_name chinhanh.local;

    return 301 https://$host$request_uri;
}

server {
    listen [::]:443 ssl default_server;
    listen 443 ssl default_server;
    server_name chinhanh.local;

    ssl_certificate /var/www/html/ssl/chinhanh.local.pem;
    ssl_certificate_key /var/www/html/ssl/chinhanh.local-key.pem;

    root /var/www/html/public;
    index index.php index.html;

    absolute_redirect off;
    merge_slashes off;

    location ^~ /@vite/ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /vite-hmr {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location ^~ /node_modules/ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }

    location ~ ^/resources/ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }

    location /thumb {
        rewrite ^/thumb_x(\d+)x(\d+)/(.*)$ /unsafe/rs:fill:$1:$2/plain/local:///medias/$3 break;
        rewrite ^/thumb_xx(\d+)/(.*)$ /unsafe/rs:fit:0:$1/plain/local:///medias/$2 break;
        rewrite ^/thumb_x(\d+)x/(.*)$ /unsafe/rs:fit:$1:0/plain/local:///medias/$2 break;
        proxy_pass http://imgproxy:8080;
        proxy_cache imgproxy;
        proxy_cache_valid 200 60d;
        proxy_cache_valid 404 5m;
        add_header Cache-Control "public, immutable";
        add_header X-Imgproxy-Cache $upstream_cache_status;
        expires max;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept $http_accept;
    }

    location /image_resize {
        rewrite ^/image_resize/(.*)$ /unsafe/rs:fill:$arg_width:$arg_height/plain/local:///medias/$1 break;
        proxy_pass http://imgproxy:8080;
        proxy_cache imgproxy;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, immutable";
        expires max;
    }

    location /image_rs {
        rewrite ^/image_rs/(.*)$ /unsafe/rs:fit:$arg_width:$arg_height/plain/local:///medias/$1 break;
        proxy_pass http://imgproxy:8080;
        proxy_cache imgproxy;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, immutable";
        expires max;
    }

    location ^~ /app/ {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /apps/ {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; try_files $uri /index.php$is_args$args; }
    location = /robots.txt  { access_log off; log_not_found off; try_files $uri /index.php$is_args$args; }

    error_page 404 /index.php;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
        include fastcgi_params;
    }

    location ~ ^/(fpm-status|fpm-ping)$ {
        access_log off;
        allow 127.0.0.1;
        deny all;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
    }

    location ~ /\. {
        log_not_found off;
        deny all;
    }
}
